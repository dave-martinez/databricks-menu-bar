name: DatabricksMenuBar
options:
  bundleIdPrefix: com.databricks-menu-bar
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  minimumXcodeGenVersion: "2.30"

targets:
  DatabricksMenuBar:
    type: application
    platform: macOS
    sources:
      - DatabricksMenuBar
    settings:
      base:
        INFOPLIST_FILE: DatabricksMenuBar/App/Info.plist
        CODE_SIGN_ENTITLEMENTS: DatabricksMenuBar/DatabricksMenuBar.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.databricks-menu-bar.DatabricksMenuBar
        MARKETING_VERSION: "1.0.1"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
